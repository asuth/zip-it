<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' blob:; style-src 'self' 'unsafe-inline'; media-src 'self' mediastream:; img-src 'self' data:; connect-src 'self'; worker-src blob:;">
<title>Zip It</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #1a1a2e;
    border-radius: 10px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e0e0e0;
    position: relative;
    -webkit-app-region: no-drag;
  }
  #container {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 10px;
    overflow: hidden;
  }
  video { display: none; }
  canvas { display: block; width: 100%; height: 100%; }

  #hud {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 28px;
    padding: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;
    font-size: 12px; pointer-events: none;
    border-radius: 0 0 10px 10px;
    color: #ddd;
  }
  .hud-third {
    height: 28px; display: flex; align-items: center; gap: 4px;
    font-variant-numeric: tabular-nums;
    padding: 0 6px;
    overflow: hidden;
    box-sizing: border-box;
  }
  .hud-third + .hud-third { border-left: 1px solid rgba(255,255,255,0.15); }
  .hud-emoji { font-size: 14px; line-height: 1; flex-shrink: 0; }
  .hud-pct { width: 28px; text-align: right; font-size: 10px; flex-shrink: 0; }
  .hud-bar {
    flex: 1; height: 4px; background: rgba(255,255,255,0.15);
    border-radius: 2px; overflow: hidden; min-width: 0;
  }
  .hud-bar-fill { height: 100%; width: 0%; background: #81c784; transition: width 0.15s, background 0.3s; }
  .hud-alert-text { display: none; font-size: 9px; font-weight: 700; letter-spacing: 0.05em; white-space: nowrap; }
  .hud-third.hud-alert {
    background: rgba(229,57,53,0.85);
    color: white;
    font-weight: 700;
    justify-content: center;
    border-left: none !important;
    animation: pulse 0.8s infinite alternate;
  }
  .hud-third.hud-alert .hud-bar,
  .hud-third.hud-alert .hud-pct,
  .hud-third.hud-alert .hud-emoji { display: none; }
  .hud-third.hud-alert .hud-alert-text { display: inline; }

  #alert-overlay {
    display: none; position: absolute; top: 0; left: 0; right: 0;
    background: rgba(229,57,53,0.85); color: white; padding: 3px;
    font-weight: 700; font-size: 11px; text-align: center; z-index: 10;
    border-radius: 10px 10px 0 0; animation: pulse 0.8s infinite alternate;
  }
  @keyframes pulse { from { opacity: 1; } to { opacity: 0.7; } }


  #setup-msg {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #888; font-size: 12px; text-align: center;
  }

  /* Calibration overlay */
  #cal-overlay {
    display: none;
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    z-index: 20;
    flex-direction: column; align-items: center; justify-content: center;
    padding: 16px; text-align: center;
    border-radius: 10px;
  }
  #cal-overlay.active { display: flex; }
  #cal-title { font-size: 13px; font-weight: 700; margin-bottom: 6px; }
  #cal-instruction { font-size: 11px; color: #aaa; margin-bottom: 10px; line-height: 1.4; }
  #cal-progress-ring {
    width: 50px; height: 50px; margin-bottom: 8px;
  }
  #cal-progress-ring circle {
    fill: none; stroke-width: 4; stroke-linecap: round;
    transform-origin: center; transform: rotate(-90deg);
  }
  #cal-ring-bg { stroke: rgba(255,255,255,0.1); }
  #cal-ring-fg { stroke: #64b5f6; stroke-dasharray: 141; stroke-dashoffset: 141; transition: stroke-dashoffset 0.1s; }
  #cal-status { font-size: 10px; color: #666; font-variant-numeric: tabular-nums; }
  #cal-btn {
    -webkit-app-region: no-drag;
    cursor: pointer; pointer-events: auto;
    background: #2a3a5c; border: 1px solid #3a5a8c; color: #ccc;
    padding: 4px 12px; border-radius: 6px; font-size: 10px;
    margin-top: 6px;
  }
  #cal-btn:hover { background: #3a5a8c; }

  /* Recalibrate button — top right corner */
  #recal-btn {
    -webkit-app-region: no-drag;
    cursor: pointer; pointer-events: auto;
    position: absolute; top: 6px; right: 6px; z-index: 5;
    background: none; border: none; outline: none;
    padding: 2px; border-radius: 4px;
    opacity: 0.4; transition: opacity 0.15s;
    line-height: 0;
  }
  #recal-btn:hover { opacity: 0.8; }
  #recal-btn:focus { outline: none; }
  #recal-btn svg { display: block; }
</style>
</head>
<body>
<div id="container">
  <video id="video" playsinline></video>
  <canvas id="overlay"></canvas>
  <div id="alert-overlay">Zip it!</div>

  <!-- Calibration overlay -->
  <div id="cal-overlay">
    <div id="cal-title">Calibrate</div>
    <div id="cal-instruction">--</div>
    <svg id="cal-progress-ring" viewBox="0 0 50 50">
      <circle id="cal-ring-bg" cx="25" cy="25" r="22.5"/>
      <circle id="cal-ring-fg" cx="25" cy="25" r="22.5"/>
    </svg>
    <div id="cal-status"></div>
    <button id="cal-btn" style="display:none">Recalibrate</button>
  </div>

  <div id="hud">
    <div class="hud-third" id="postureHalf">
      <span class="hud-emoji" id="postureIcon">&#x1F9B4;</span>
      <span class="hud-pct" id="posturePct">--%</span>
      <div class="hud-bar"><div class="hud-bar-fill" id="postureBar"></div></div>
      <span class="hud-alert-text">SIT UP</span>
    </div>
    <div class="hud-third" id="handHalf">
      <span class="hud-emoji">&#x270B;</span>
      <span class="hud-pct" id="handPct">--%</span>
      <div class="hud-bar"><div class="hud-bar-fill" id="handBar"></div></div>
      <span class="hud-alert-text">HANDS OFF</span>
    </div>
    <div class="hud-third" id="mouthHalf">
      <span class="hud-emoji" id="mouthIcon">&#x1F444;</span>
      <span class="hud-pct" id="mouthPct">--%</span>
      <div class="hud-bar"><div class="hud-bar-fill" id="mouthBar"></div></div>
      <span class="hud-alert-text">ZIP IT</span>
    </div>
  </div>
  <button id="recal-btn" title="Recalibrate"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
</div>
<p id="setup-msg">Loading model...</p>

<script type="module">
const vision = await import('./vendor/vision_bundle.mjs');
const { FaceLandmarker, FilesetResolver } = vision;

const video = document.getElementById('video');
const canvas = document.getElementById('overlay');
const ctx = canvas.getContext('2d');
const alertOverlay = document.getElementById('alert-overlay');
const postureBar = document.getElementById('postureBar');
const posturePct = document.getElementById('posturePct');
const mouthBar = document.getElementById('mouthBar');
const mouthPct = document.getElementById('mouthPct');
const setupMsg = document.getElementById('setup-msg');
const calOverlay = document.getElementById('cal-overlay');
const calTitle = document.getElementById('cal-title');
const calInstruction = document.getElementById('cal-instruction');
const calRingFg = document.getElementById('cal-ring-fg');
const calStatus = document.getElementById('cal-status');
const calBtn = document.getElementById('cal-btn');
const recalBtn = document.getElementById('recal-btn');

const ALERT_AFTER_SECS = 3.0;
const ALERT_REPEAT_INTERVAL = 5;
const CAL_DURATION = 5000;       // 5 seconds per step
const CAL_RING_CIRCUMF = 141.37; // 2π * 22.5
const CAL_STORAGE_KEY = 'zipIt_calibration';

// --- Calibration state ---
let openThreshold = 0.07; // default threshold (inner lip gap / outer lip height)
let calibrating = false;
let calStep = null;  // 'closed' | 'open' | null
let calStart = 0;
let calSamples = [];
let calClosed = 0;
let calOpen = 0;

function loadCalibration() {
  try {
    const data = JSON.parse(localStorage.getItem(CAL_STORAGE_KEY));
    if (data && data.threshold > 0) {
      openThreshold = data.threshold;
      calClosed = data.closed;
      calOpen = data.open;
      return true;
    }
  } catch {}
  return false;
}

function saveCalibration() {
  localStorage.setItem(CAL_STORAGE_KEY, JSON.stringify({
    threshold: openThreshold,
    closed: calClosed,
    open: calOpen,
    date: Date.now(),
  }));
}

function startCalibration() {
  calibrating = false;
  calOverlay.classList.add('active');
  calTitle.textContent = 'Close mouth';
  calRingFg.style.strokeDashoffset = CAL_RING_CIRCUMF;
  calRingFg.style.stroke = '#64b5f6';
  calStatus.textContent = '';
  calInstruction.textContent = '';
  calBtn.textContent = 'Go';
  calBtn.style.display = 'inline-block';
  calBtn.onclick = () => {
    calibrating = true;
    calStep = 'closed';
    calSamples = [];
    calStart = performance.now();
    calBtn.style.display = 'none';
  };
}

function showOpenStep() {
  calibrating = false;
  calTitle.textContent = 'Open mouth';
  calRingFg.style.strokeDashoffset = CAL_RING_CIRCUMF;
  calRingFg.style.stroke = '#ffb74d';
  calBtn.textContent = 'Go';
  calBtn.style.display = 'inline-block';
  calBtn.onclick = () => {
    calibrating = true;
    calStep = 'open';
    calSamples = [];
    calStart = performance.now();
    calBtn.style.display = 'none';
  };
}

function calTick(ratio) {
  if (!calibrating) return;
  const elapsed = performance.now() - calStart;
  const progress = Math.min(elapsed / CAL_DURATION, 1);
  calRingFg.style.strokeDashoffset = CAL_RING_CIRCUMF * (1 - progress);
  calStatus.textContent = '';

  // Discard first 500ms (settling time)
  if (elapsed > 500) calSamples.push(ratio);

  if (progress >= 1) {
    if (calStep === 'closed') {
      calSamples.sort((a, b) => a - b);
      calClosed = calSamples[Math.floor(calSamples.length / 2)];
      showOpenStep();
    } else if (calStep === 'open') {
      calSamples.sort((a, b) => a - b);
      calOpen = calSamples[Math.floor(calSamples.length / 2)];
      finishCalibration();
    }
  }
}

function finishCalibration() {
  // Set threshold at 40% between closed and open (biased toward closed = more sensitive)
  const range = calOpen - calClosed;
  if (range > 0.005) {
    openThreshold = calClosed + range * 0.4;
  } else {
    // Values too close — use a small offset from closed
    openThreshold = calClosed + 0.01;
  }

  saveCalibration();
  calibrating = false;
  calStep = null;
  calTitle.textContent = 'Calibrated';
  calInstruction.textContent = `Closed ${calClosed.toFixed(3)} / Open ${calOpen.toFixed(3)}\nThreshold ${openThreshold.toFixed(3)}`;
  calRingFg.style.strokeDashoffset = 0;
  calRingFg.style.stroke = '#81c784';
  calStatus.textContent = '';
  calBtn.textContent = 'OK';
  calBtn.style.display = 'inline-block';
  calBtn.onclick = () => {
    calOverlay.classList.remove('active');
  };

}

// --- Audio ---
let audioCtx = null;
function ensureAudio() { if (!audioCtx) audioCtx = new AudioContext(); }
function noise(duration) {
  const a = ensureAudio() || audioCtx;
  const len = a.sampleRate * duration;
  const buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}
function beep() {
  const a = audioCtx || (ensureAudio(), audioCtx);
  if (a.state === 'suspended') a.resume();
  const t = a.currentTime;
  for (let i = 0; i < 3; i++) {
    const ns = a.createBufferSource(); ns.buffer = noise(0.03);
    const bp = a.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2800; bp.Q.value = 4;
    const g = a.createGain();
    g.gain.setValueAtTime(0.45, t + i * 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.1 + 0.025);
    ns.connect(bp).connect(g).connect(a.destination);
    ns.start(t + i * 0.1); ns.stop(t + i * 0.1 + 0.03);
  }
}

function postureDing() {
  const a = audioCtx || (ensureAudio(), audioCtx);
  if (a.state === 'suspended') a.resume();
  const t = a.currentTime;
  [330, 495, 660].forEach((f, i) => {
    const osc = a.createOscillator(); osc.type = 'square'; osc.frequency.value = f;
    const g = a.createGain(); g.gain.setValueAtTime(0.12, t + i * 0.07); g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.07 + 0.05);
    osc.connect(g).connect(a.destination); osc.start(t + i * 0.07); osc.stop(t + i * 0.07 + 0.06);
  });
}

function handTink() {
  const a = audioCtx || (ensureAudio(), audioCtx);
  if (a.state === 'suspended') a.resume();
  const t = a.currentTime;
  [2093, 4186].forEach((f, i) => {
    const osc = a.createOscillator(); osc.type = 'sine'; osc.frequency.value = f;
    const g = a.createGain(); g.gain.setValueAtTime(i === 0 ? 0.12 : 0.05, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(g).connect(a.destination); osc.start(t); osc.stop(t + 0.25);
  });
}

// --- Face Landmarker ---
const wasmFiles = await FilesetResolver.forVisionTasks('./vendor/wasm');
const faceLandmarker = await FaceLandmarker.createFromOptions(wasmFiles, {
  baseOptions: { modelAssetPath: './vendor/face_landmarker.task', delegate: 'GPU' },
  runningMode: 'VIDEO',
  numFaces: 1,
  outputFaceBlendshapes: false,
});

const { HandLandmarker, PoseLandmarker } = vision;
const handLandmarker = await HandLandmarker.createFromOptions(wasmFiles, {
  baseOptions: { modelAssetPath: './vendor/hand_landmarker.task', delegate: 'GPU' },
  runningMode: 'VIDEO',
  numHands: 2,
});
const poseLandmarker = await PoseLandmarker.createFromOptions(wasmFiles, {
  baseOptions: { modelAssetPath: './vendor/pose_landmarker_lite.task', delegate: 'GPU' },
  runningMode: 'VIDEO',
  numPoses: 1,
});

// --- Auto-select most forward-facing camera ---
setupMsg.textContent = 'Finding best camera...';

async function pickBestCamera() {
  // First, request camera access to get labeled device list
  const tempStream = await navigator.mediaDevices.getUserMedia({ video: true });
  tempStream.getTracks().forEach(t => t.stop());

  const devices = await navigator.mediaDevices.enumerateDevices();
  const cameras = devices.filter(d => d.kind === 'videoinput'
    && !d.label.toLowerCase().includes('continuity')
    && !d.label.toLowerCase().includes('iphone'));

  if (cameras.length <= 1) {
    // Only one camera (or none) — just use it directly
    const s = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
    });
    return s;
  }

  // Score each camera by how forward-facing the detected face is
  let bestStream = null, bestScore = -1, bestId = null;

  for (let ci = 0; ci < cameras.length; ci++) {
    const cam = cameras[ci];
    setupMsg.textContent = `Testing camera ${ci + 1} of ${cameras.length}...`;
    let stream;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { deviceId: { exact: cam.deviceId }, width: { ideal: 640 }, height: { ideal: 480 } }
      });
    } catch { continue; }

    const probe = document.createElement('video');
    probe.srcObject = stream;
    probe.muted = true;
    await probe.play();

    // Try multiple times — some cameras need longer to produce usable frames
    let score = -1;
    for (let attempt = 0; attempt < 5; attempt++) {
      await new Promise(r => setTimeout(r, 300));
      try {
        const result = faceLandmarker.detectForVideo(probe, performance.now());
        if (result.faceLandmarks && result.faceLandmarks.length > 0) {
          const lm = result.faceLandmarks[0];
          const nose = lm[1];
          const dRight = Math.hypot(nose.x - lm[234].x, nose.y - lm[234].y);
          const dLeft  = Math.hypot(nose.x - lm[454].x, nose.y - lm[454].y);
          const symmetry = 1 - Math.abs(dRight - dLeft) / (dRight + dLeft);
          const faceWidth = Math.abs(lm[234].x - lm[454].x);
          score = symmetry * faceWidth;
          break;
        }
      } catch {}
    }

    if (score > bestScore) {
      // Release previous best stream
      if (bestStream) bestStream.getTracks().forEach(t => t.stop());
      bestScore = score;
      bestStream = stream;
      bestId = cam.deviceId;
    } else {
      stream.getTracks().forEach(t => t.stop());
    }

    probe.pause();
    probe.srcObject = null;
  }

  if (!bestStream) {
    bestStream = await navigator.mediaDevices.getUserMedia({
      video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
    });
  }
  return bestStream;
}

const stream = await pickBestCamera();
video.srcObject = stream;
await video.play();

function resizeCanvas() {
  canvas.width = canvas.clientWidth * devicePixelRatio;
  canvas.height = canvas.clientHeight * devicePixelRatio;
}
resizeCanvas();
new ResizeObserver(resizeCanvas).observe(canvas);
setupMsg.style.display = 'none';

const OUTER_LIP = [61,146,91,181,84,17,314,405,321,375,291,409,270,269,267,0,37,39,40,185];
const INNER_LIP = [78,95,88,178,87,14,317,402,318,324,308,415,310,311,312,13,82,81,80,191];

function dist2d(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

function mouthOpenness(lm) {
  // Average vertical gap between 3 inner lip center pairs.
  // Measures actual lip separation, not area — immune to smiling.
  const d1 = Math.abs(lm[82].y - lm[87].y);   // right of center
  const d2 = Math.abs(lm[13].y - lm[14].y);   // center
  const d3 = Math.abs(lm[312].y - lm[317].y); // left of center
  const avgGap = (d1 + d2 + d3) / 3;

  // Normalize by outer lip vertical extent (top to bottom of lip).
  // Both scale identically with head tilt → pose-invariant.
  // When smiling: gap stays ~0, lip height shrinks → ratio stays low.
  let minY = 1, maxY = 0;
  for (const idx of OUTER_LIP) {
    if (lm[idx].y < minY) minY = lm[idx].y;
    if (lm[idx].y > maxY) maxY = lm[idx].y;
  }
  const outerHeight = maxY - minY;
  return outerHeight > 0 ? avgGap / outerHeight : 0;
}

// --- Posture estimation ---
// Uses MediaPipe Pose Landmarker to measure head position relative to shoulders.
// Slouching = nose drops closer to shoulder line.
const postureIcon = document.getElementById('postureIcon');
const mouthIcon = document.getElementById('mouthIcon');
const postureHalf = document.getElementById('postureHalf');
const mouthHalf = document.getElementById('mouthHalf');
const postureAlertText = postureHalf.querySelector('.hud-alert-text');

const POSTURE_ALERT_SECS = 4;
const POSTURE_REPEAT_SECS = 8;
// Absolute thresholds for nose-to-shoulder ratio (normalized by shoulder width)
const POSTURE_RATIO_WARN = 0.45;  // below this = slouching warning
const POSTURE_RATIO_BAD = 0.37;   // below this = slouching alert

let postureBadSince = null;
let lastPostureDing = 0;

function getPostureRatio(now) {
  // Run pose detection
  let poseResult;
  try { poseResult = poseLandmarker.detectForVideo(video, now); } catch { return null; }
  if (!poseResult.landmarks || poseResult.landmarks.length === 0) return null;

  const pose = poseResult.landmarks[0];
  const nose = pose[0];
  const lShoulder = pose[11];
  const rShoulder = pose[12];

  // Vertical distance from nose to shoulder midpoint (normalized)
  // Larger = more upright, smaller = slouching
  const shoulderMidY = (lShoulder.y + rShoulder.y) / 2;
  const noseToShoulders = shoulderMidY - nose.y;

  // Normalize by shoulder width for distance invariance
  const shoulderWidth = Math.abs(lShoulder.x - rShoulder.x);
  if (shoulderWidth < 0.01) return null;

  return noseToShoulders / shoulderWidth;
}

const handHalf = document.getElementById('handHalf');
const handBar = document.getElementById('handBar');
const handPct = document.getElementById('handPct');

const HAND_ALERT_SECS = 1;
const HAND_REPEAT_SECS = 8;
let handOnFace = false;
let handBadSince = null;
let lastHandDing = 0;

function checkHandOnFace(faceLm, now) {
  // Run hand detection
  let handResult;
  try { handResult = handLandmarker.detectForVideo(video, now); } catch { return false; }
  if (!handResult.landmarks || handResult.landmarks.length === 0) return false;

  // Get face bounding box
  let fMinX = 1, fMaxX = 0, fMinY = 1, fMaxY = 0;
  for (const p of faceLm) {
    if (p.x < fMinX) fMinX = p.x; if (p.x > fMaxX) fMaxX = p.x;
    if (p.y < fMinY) fMinY = p.y; if (p.y > fMaxY) fMaxY = p.y;
  }
  // Expand face box slightly
  const pad = 0.03;
  fMinX -= pad; fMaxX += pad; fMinY -= pad; fMaxY += pad;

  // Check if any hand landmark overlaps the face region
  for (const hand of handResult.landmarks) {
    for (const pt of hand) {
      if (pt.x >= fMinX && pt.x <= fMaxX && pt.y >= fMinY && pt.y <= fMaxY) {
        return true;
      }
    }
  }
  return false;
}

function updateHand(lm, now) {
  handOnFace = checkHandOnFace(lm, now);
  handPct.textContent = handOnFace ? '0%' : '100%';

  if (handOnFace) {
    if (!handBadSince) handBadSince = now;
    const badSecs = (now - handBadSince) / 1000;
    const progress = Math.min(badSecs / HAND_ALERT_SECS, 1);
    handBar.style.width = (progress * 100) + '%';
    handBar.style.background = badSecs >= HAND_ALERT_SECS ? '#e53935' : '#ffb74d';
    if (badSecs >= HAND_ALERT_SECS) {
      handHalf.classList.add('hud-alert');
      if ((now - lastHandDing) / 1000 >= HAND_REPEAT_SECS) {
        handTink();
        lastHandDing = now;
        if (window.zipIt) window.zipIt.alert(true);
      }
    } else {
      handHalf.classList.remove('hud-alert');
    }
  } else {
    handBadSince = null;
    handHalf.classList.remove('hud-alert');
    handBar.style.width = '0%';
    handBar.style.background = '#81c784';
  }
}

function updatePosture(lm, now) {
  const ratio = getPostureRatio(now);
  if (ratio === null) return;

  // Map ratio to percentage: BAD=0%, upright(0.60)=100%
  const pct = Math.max(0, Math.min(100, Math.round(((ratio - POSTURE_RATIO_BAD) / (0.60 - POSTURE_RATIO_BAD)) * 100)));
  posturePct.textContent = pct + '%';

  const isBad = ratio < POSTURE_RATIO_BAD;
  const isWarn = ratio < POSTURE_RATIO_WARN;

  if (isWarn) {
    if (!postureBadSince) postureBadSince = now;
    const badSecs = (now - postureBadSince) / 1000;
    const progress = Math.min(badSecs / POSTURE_ALERT_SECS, 1);
    postureBar.style.width = (progress * 100) + '%';
    postureBar.style.background = isBad ? '#e53935' : '#ffb74d';
    if (isBad && badSecs >= POSTURE_ALERT_SECS) {
      postureHalf.classList.add('hud-alert');
      postureAlertText.textContent = 'SIT UP';
      if ((now - lastPostureDing) / 1000 >= POSTURE_REPEAT_SECS) {
        postureDing();
        lastPostureDing = now;
        if (window.zipIt) window.zipIt.alert(true);
      }
    } else {
      postureHalf.classList.remove('hud-alert');
    }
  } else {
    postureBadSince = null;
    postureHalf.classList.remove('hud-alert');
    postureBar.style.width = '0%';
    postureBar.style.background = '#81c784';
  }
}

// --- Zoom ---
let zX = 0.5, zY = 0.5, zS = 1;
const LERP = 0.015, DEAD = 0.03, TARGET_ZOOM = 1.8;

function updateZoom(lm) {
  let minX = 1, maxX = 0, minY = 1, maxY = 0;
  for (const p of lm) {
    if (p.x < minX) minX = p.x; if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y; if (p.y > maxY) maxY = p.y;
  }
  const cx = (minX + maxX) / 2, cy = (minY + maxY) / 2;
  const sz = Math.max(maxX - minX, maxY - minY);
  const tgtS = Math.min(TARGET_ZOOM, 0.55 / sz);
  const dx = cx - zX, dy = cy - zY;
  if (Math.abs(dx) > DEAD) zX += dx * LERP;
  if (Math.abs(dy) > DEAD) zY += dy * LERP;
  zS += (tgtS - zS) * LERP;
}

function resetZoom() {
  zX += (0.5 - zX) * 0.005;
  zY += (0.5 - zY) * 0.005;
  zS += (1 - zS) * 0.005;
}

function drawFrame(lm, lipColor) {
  const cw = canvas.width, ch = canvas.height;
  ctx.clearRect(0, 0, cw, ch);
  ctx.save();
  ctx.translate(cw, 0);
  ctx.scale(-1, 1);
  const vw = video.videoWidth, vh = video.videoHeight;
  const canvasAR = cw / ch, videoAR = vw / vh;
  let baseW, baseH;
  if (videoAR > canvasAR) { baseH = 1; baseW = canvasAR / videoAR; }
  else { baseW = 1; baseH = videoAR / canvasAR; }
  const viewW = baseW / zS, viewH = baseH / zS;
  let sx = (zX - viewW / 2) * vw, sy = (zY - viewH / 2) * vh;
  let sw = viewW * vw, sh = viewH * vh;
  if (sx < 0) sx = 0; if (sy < 0) sy = 0;
  if (sx + sw > vw) sx = vw - sw; if (sy + sh > vh) sy = vh - sh;
  ctx.drawImage(video, sx, sy, sw, sh, 0, 0, cw, ch);
  if (lm && lipColor) {
    ctx.strokeStyle = lipColor;
    ctx.lineWidth = 2 * devicePixelRatio;
    for (const ring of [OUTER_LIP, INNER_LIP]) {
      ctx.beginPath();
      ring.forEach((idx, i) => {
        const px = ((lm[idx].x * vw) - sx) / sw * cw;
        const py = ((lm[idx].y * vh) - sy) / sh * ch;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      });
      ctx.closePath();
      ctx.stroke();
    }
  }
  ctx.restore();
}

// --- Background-safe timer ---
const timerWorker = new Worker(
  URL.createObjectURL(new Blob([`
    let id = null;
    onmessage = e => { if (id) clearInterval(id); id = setInterval(() => postMessage(0), e.data); };
  `], { type: 'application/javascript' }))
);

let mouthOpenSince = null, lastAlertTime = 0, alertActive = false, lastTs = -1;

function detect() {
  let now = performance.now();
  if (now <= lastTs) now = lastTs + 1;
  lastTs = now;

  let result;
  try { result = faceLandmarker.detectForVideo(video, now); } catch { return; }
  const visible = document.visibilityState === 'visible';

  if (result.faceLandmarks && result.faceLandmarks.length > 0) {
    const lm = result.faceLandmarks[0];
    const ratio = mouthOpenness(lm);

    // Feed calibration if active
    if (calibrating) {
      calTick(ratio);
      if (visible) drawFrame(lm, '#64b5f6');
      updateZoom(lm);
      return;
    }

    updatePosture(lm, now);
    updateHand(lm, now);
    const isOpen = ratio > openThreshold;

    // Mouth percentage: 100% = closed (good), 0% = wide open (bad)
    const mouthPctVal = Math.max(0, Math.min(100, 100 - Math.round((ratio / (openThreshold * 3)) * 100)));
    mouthPct.textContent = mouthPctVal + '%';

    if (isOpen) { if (!mouthOpenSince) mouthOpenSince = now; }
    else {
      if (alertActive && window.zipIt) window.zipIt.alert(false);
      mouthOpenSince = null; alertActive = false;
      mouthHalf.classList.remove('hud-alert');
    }

    const openSecs = mouthOpenSince ? (now - mouthOpenSince) / 1000 : 0;
    const mouthProgress = Math.min(openSecs / ALERT_AFTER_SECS, 1);
    mouthBar.style.width = (mouthProgress * 100) + '%';

    if (openSecs >= ALERT_AFTER_SECS) {
      if (!alertActive || (now - lastAlertTime) / 1000 >= ALERT_REPEAT_INTERVAL) {
        beep(); lastAlertTime = now; alertActive = true;
        if (window.zipIt) window.zipIt.alert(true);
      }
      mouthHalf.classList.add('hud-alert');
      mouthBar.style.background = '#e53935';
    } else {
      mouthHalf.classList.remove('hud-alert');
      mouthBar.style.background = isOpen ? '#ffb74d' : '#81c784';
    }

    // Clear tray alert only when all three are clear
    const anyAlert = alertActive || postureHalf.classList.contains('hud-alert') || handHalf.classList.contains('hud-alert');
    if (!anyAlert && window.zipIt) window.zipIt.alert(false);

    updateZoom(lm);
    if (visible) {
      const lipColor = alertActive ? '#e53935' : isOpen ? '#ffb74d' : '#81c784';
      drawFrame(lm, lipColor);
    }
  } else {
    mouthPct.textContent = '--%';
    posturePct.textContent = '--%';
    handPct.textContent = '--%';
    mouthBar.style.width = '0%';
    postureBar.style.width = '0%';
    handBar.style.width = '0%';
    mouthHalf.classList.remove('hud-alert');
    postureHalf.classList.remove('hud-alert');
    handHalf.classList.remove('hud-alert');
    mouthOpenSince = null;
    postureBadSince = null;
    handBadSince = null;
    resetZoom();
    if (visible) drawFrame(null, null);
  }
}

// --- Recalibrate button ---
recalBtn.addEventListener('click', () => startCalibration());

// --- Init: load calibration if available ---
loadCalibration();

// Allow forcing recalibration via IPC from main process or devtools
window._recalibrate = () => {
  localStorage.removeItem(CAL_STORAGE_KEY);
  if (window.zipIt) window.zipIt.showWindow();
  startCalibration();
};

// Worker at 250ms for background detection
timerWorker.postMessage(250);
timerWorker.onmessage = () => {
  if (document.visibilityState !== 'visible') detect();
};
// rAF only when visible (smooth UI, pauses when hidden)
function rafLoop() {
  if (document.visibilityState === 'visible') detect();
  requestAnimationFrame(rafLoop);
}
requestAnimationFrame(rafLoop);
</script>
