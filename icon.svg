      <line x1="36" y1="30" x2="36" y2="37"/>
      <line x1="36" y1="37" x2="36" y2="44"/>
      <line x1="45" y1="30" x2="45" y2="37"/>
      <line x1="45" y1="37" x2="45" y2="44"/>
      <line x1="54" y1="30" x2="54" y2="37"/>
      <line x1="54" y1="37" x2="54" y2="44"/>
